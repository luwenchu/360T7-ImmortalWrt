name: Build 360T7 ImageBuilder firmware

on:
  workflow_dispatch:
  schedule:
    - cron: "30 20 * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-360t7-imagebuilder.yml"
      - "scripts/build.sh"
      - "files/**"
      - "packages/**"

permissions:
  contents: write

concurrency:
  group: 360t7-imagebuilder
  cancel-in-progress: false

env:
  TZ: Asia/Shanghai
  IMMORTALWRT_ROOT: https://downloads.immortalwrt.org/releases/24.10-SNAPSHOT/targets/mediatek/filogic
  DAED_REPOSITORY: kenzok8/openwrt-daede
  SSR_PLUS_REPOSITORY: fw876/helloworld
  OPENCLASH_REPOSITORY: vernesong/OpenClash
  MOSDNS_REPOSITORY: sbwml/luci-app-mosdns

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential ca-certificates curl device-tree-compiler file gawk gettext jq \
            libncurses-dev python3 rsync u-boot-tools unzip zstd

      - name: Resolve ImageBuilder cache key
        id: imagebuilder
        run: |
          filename="immortalwrt-imagebuilder-24.10-SNAPSHOT-mediatek-filogic.Linux-x86_64.tar.zst"
          checksum="$(
            curl --fail --location --retry 4 "${IMMORTALWRT_ROOT}/sha256sums" |
              awk -v file="${filename}" '$2 == "*" file { print $1 }'
          )"
          [[ "${checksum}" =~ ^[0-9a-f]{64}$ ]]
          echo "sha256=${checksum}" >>"${GITHUB_OUTPUT}"

      - name: Cache verified ImageBuilder archive
        uses: actions/cache@v4
        with:
          path: work/downloads
          key: imagebuilder-${{ runner.os }}-${{ steps.imagebuilder.outputs.sha256 }}

      - name: Build qihoo_360t7 sysupgrade image
        id: build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash ./scripts/build.sh

      - name: Upload verified firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.release_tag }}
          path: dist/*
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.build.outputs.release_tag }}
          name: ${{ steps.build.outputs.release_tag }}
          body_path: dist/RELEASE_NOTES.md
          files: |
            dist/*.itb
            dist/*.bin
            dist/*.manifest
            dist/*.json
            dist/*.sha256
          fail_on_unmatched_files: true
          overwrite_files: true
