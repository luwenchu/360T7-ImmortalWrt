name: Build 360T7 ImageBuilder firmware

on:
  workflow_dispatch:
  schedule:
    - cron: "30 20 * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-360t7-imagebuilder.yml"
      - "scripts/build.sh"
      - "files/**"

permissions:
  contents: write

concurrency:
  group: 360t7-imagebuilder
  cancel-in-progress: false

env:
  TZ: Asia/Shanghai
  IMMORTALWRT_ROOT: https://downloads.immortalwrt.org/releases/24.10-SNAPSHOT/targets/mediatek/filogic
  DAED_REPOSITORY: kenzok8/openwrt-daede

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential ca-certificates curl file gawk gettext jq \
            libncurses-dev python3 rsync unzip zstd

      - name: Build qihoo_360t7 sysupgrade image
        id: build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/build.sh

      - name: Upload verified firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.release_tag }}
          path: dist/*
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.build.outputs.release_tag }}
          name: ${{ steps.build.outputs.release_tag }}
          body_path: dist/RELEASE_NOTES.md
          files: |
            dist/*.itb
            dist/*.manifest
            dist/*.json
            dist/*.sha256
          fail_on_unmatched_files: true
          overwrite_files: true

